version: "3.9"

# Demo 01 — IO chaos injected into PostgreSQL via LD_PRELOAD
# libchaos-io intercepts pwrite(2) and fdatasync(2) and returns EIO at the
# configured probability.  PostgreSQL PANICs on any WAL write failure —
# only committed data survives.
#
# Config format (hot-reloaded, no restart needed):
#   <path_prefix>:<syscall>:<errno_name>:<probability 0-1>
#
# Shared volumes:
#   chaos-libs  — the pre-built .so files (downloaded from GitHub releases)
#   chaos-conf  — plain-text config files written by the app

volumes:
  pgdata:
  chaos-libs:
  chaos-conf:

networks:
  pg-chaos:
    driver: bridge

services:

  # ------------------------------------------------------------------ #
  #  chaos-libs-init — downloads chaos .so from GitHub releases         #
  # ------------------------------------------------------------------ #
  chaos-libs-init:
    image: alpine:3.19
    container_name: chaos-libs-init
    volumes:
      - chaos-libs:/chaos/libs
    environment:
      CHAOS_LIBS_VERSION: ${CHAOS_LIBS_VERSION:-1.0.0}
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache wget
        ARCH=$$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        echo "[chaos-libs-init] arch: $${ARCH}"
        wget -P /chaos/libs \
          "https://github.com/macstab/macstab-chaos-testing-libraries/releases/download/$${CHAOS_LIBS_VERSION}/libchaos-io-musl-$${ARCH}.so"
        ln -sf "/chaos/libs/libchaos-io-musl-$${ARCH}.so" /chaos/libs/libchaos-io-musl.so
        echo "[chaos-libs-init] done → $(ls /chaos/libs/)"
    restart: "no"

  # ------------------------------------------------------------------ #
  #  chaos-probe — holds the chaos-conf volume alive                    #
  # ------------------------------------------------------------------ #
  chaos-probe:
    image: alpine:3.19
    container_name: chaos-probe
    volumes:
      - chaos-conf:/tmp
    command:
      - sh
      - -c
      - |
        echo '[chaos-probe] volume keeper running'
        tail -f /dev/null
    networks:
      - pg-chaos
    restart: "no"

  # ------------------------------------------------------------------ #
  #  postgres — LD_PRELOAD injects IO chaos at the libc level           #
  # ------------------------------------------------------------------ #
  postgres:
    image: postgres:16-alpine
    container_name: postgres-chaos
    depends_on:
      chaos-probe:
        condition: service_started
      chaos-libs-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos
      POSTGRES_DB: chaosdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - chaos-libs:/chaos/libs:ro
      - chaos-conf:/tmp
    entrypoint:
      - sh
      - -c
      - |
        export LD_PRELOAD=/chaos/libs/libchaos-io-musl.so
        echo "[postgres] LD_PRELOAD=$${LD_PRELOAD}"
        exec su-exec postgres docker-entrypoint.sh postgres -c wal_writer_delay=10s
    networks:
      - pg-chaos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaos -d chaosdb"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: on-failure

  # ------------------------------------------------------------------ #
  #  app — runs the INSERT workload and measures error rates            #
  # ------------------------------------------------------------------ #
  app:
    image: alpine:3.19
    container_name: chaos-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: chaos
      PGPASSWORD: chaos
      PGDATABASE: chaosdb
    volumes:
      - chaos-conf:/tmp
    networks:
      - pg-chaos
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache postgresql-client

        echo '=== Creating test table ==='
        psql -c 'DROP TABLE IF EXISTS chaos_test;
                 CREATE TABLE chaos_test (
                   id       SERIAL PRIMARY KEY,
                   batch    INT NOT NULL,
                   payload  TEXT NOT NULL,
                   ts       TIMESTAMPTZ DEFAULT now()
                 );'

        ARM_CHAOS() {
          printf '/var/lib/postgresql/data/pg_wal:pwrite:EIO:0.3\n/var/lib/postgresql/data/pg_wal:fdatasync:EIO:0.2\n' \
            > /tmp/.chaos-io.conf
        }
        DISARM_CHAOS() {
          rm -f /tmp/.chaos-io.conf
        }
        WAIT_FOR_PG() {
          tries=0
          while [ $$(( tries < 40 )) -eq 1 ]; do
            if pg_isready -h postgres -U chaos -d chaosdb 2>/dev/null; then
              sleep 2
              return 0
            fi
            sleep 2
            tries=$$(( tries + 1 ))
          done
          return 1
        }

        trap DISARM_CHAOS EXIT

        echo '=== Arming chaos — EIO on WAL pwrite/fdatasync, pg_wal only ==='
        ARM_CHAOS

        echo '=== Running 20 batches of 100 INSERTs ==='

        SUCCESSES=0
        FAILURES=0
        i=1
        while [ $$(( i <= 20 )) -eq 1 ]; do
          SQL="BEGIN;"
          j=1
          while [ $$(( j <= 100 )) -eq 1 ]; do
            SQL="$${SQL} INSERT INTO chaos_test(batch, payload) VALUES($${i}, 'payload-$${i}-$${j}');"
            j=$$(( j + 1 ))
          done
          SQL="$${SQL} COMMIT;"

          if psql -c "$${SQL}" 2>/dev/null; then
            SUCCESSES=$$(( SUCCESSES + 1 ))
            echo "  batch $${i}: OK"
          else
            FAILURES=$$(( FAILURES + 1 ))
            echo "  batch $${i}: FAILED (EIO injected)"
            DISARM_CHAOS
            echo '  [chaos disarmed — waiting for postgres to recover...]'
            if WAIT_FOR_PG; then
              echo '  [postgres recovered — re-arming chaos]'
              ARM_CHAOS
            else
              echo '  [postgres recovery timed out — continuing unarmed]'
            fi
          fi
          i=$$(( i + 1 ))
        done

        echo ''
        echo '=== Results ==='
        echo "  Successful batches : $${SUCCESSES}"
        echo "  Failed batches     : $${FAILURES}"
        echo ''

        DISARM_CHAOS
        echo '=== Waiting for postgres before final stats... ==='
        WAIT_FOR_PG || echo '[postgres not available for stats]'

        set +e

        echo '=== Row count (only committed data) ==='
        psql -c 'SELECT batch, COUNT(*) AS rows FROM chaos_test GROUP BY batch ORDER BY batch;'

        echo ''
        echo '=== Checksum verification ==='
        psql -c "SELECT md5(string_agg(payload, '' ORDER BY id)) AS payload_checksum FROM chaos_test;"

        echo ''
        echo '=== pg_stat_bgwriter ==='
        psql -c 'SELECT checkpoints_req, checkpoints_timed, buffers_checkpoint FROM pg_stat_bgwriter;'

        echo ''
        echo '=== Demo complete. ==='
    restart: "no"
