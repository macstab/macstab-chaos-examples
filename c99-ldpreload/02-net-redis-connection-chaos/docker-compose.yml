version: "3.9"

# Demo 02 — Network chaos on a Python Redis client via LD_PRELOAD
#
# libchaos-net intercepts connect(2), recv(2), send(2) and can inject
# ERRNO faults or latency based on a per-rule config file.
#
# Config format:
#   <proto>://<host>:<port>:<syscall>:ERRNO:<errno_name>:<probability>
#   <proto>://<host>:<port>:<syscall>:LATENCY:<ms>:<probability>
#
# This demo sets:
#   30 % ECONNREFUSED on connect  → redis-py raises ConnectionError
#   10 % EAGAIN on recv           → redis-py raises TimeoutError
#    5 % ECONNRESET on recv       → redis-py raises ConnectionError

volumes:
  chaos-libs:
  chaos-conf:

networks:
  redis-chaos:
    driver: bridge

services:

  # ------------------------------------------------------------------ #
  #  chaos-libs-init — downloads chaos .so from GitHub releases         #
  # ------------------------------------------------------------------ #
  chaos-libs-init:
    image: alpine:3.19
    container_name: chaos-libs-init
    volumes:
      - chaos-libs:/chaos/libs
    environment:
      CHAOS_LIBS_VERSION: ${CHAOS_LIBS_VERSION:-1.0.0}
    command: >
      sh -c "
        apk add --no-cache wget &&
        BASE=https://github.com/macstab/macstab-chaos-testing-libraries/releases/download &&
        wget -q -P /chaos/libs \$BASE/\$CHAOS_LIBS_VERSION/libchaos-net-musl-amd64.so
      "
    restart: "no"

  # ------------------------------------------------------------------ #
  #  chaos-writer — writes the net chaos config file                    #
  # ------------------------------------------------------------------ #
  chaos-writer:
    image: alpine:3.19
    container_name: chaos-writer
    volumes:
      - chaos-conf:/chaos
    command: >
      sh -c "
        mkdir -p /chaos &&
        cat > /chaos/.chaos-net.conf <<'EOF'
tcp4://redis:6379:connect:ERRNO:ECONNREFUSED:0.30
tcp4://redis:6379:recv:ERRNO:EAGAIN:0.10
tcp4://redis:6379:recv:ERRNO:ECONNRESET:0.05
EOF
        echo '[chaos-writer] config written:' &&
        cat /chaos/.chaos-net.conf &&
        tail -f /dev/null
      "
    networks:
      - redis-chaos
    restart: "no"

  # ------------------------------------------------------------------ #
  #  redis — no chaos here; the chaos is in the CLIENT's syscalls       #
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7.4-alpine
    container_name: redis-server
    networks:
      - redis-chaos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: "no"

  # ------------------------------------------------------------------ #
  #  app — Python Redis client with LD_PRELOAD network chaos            #
  # ------------------------------------------------------------------ #
  app:
    image: python:3.12-slim
    container_name: chaos-redis-app
    depends_on:
      redis:
        condition: service_healthy
      chaos-writer:
        condition: service_started
      chaos-libs-init:
        condition: service_completed_successfully
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LD_PRELOAD: /chaos/libs/libchaos-net-musl-amd64.so
      CHAOS_NET_CONF: /chaos/.chaos-net.conf
    volumes:
      - chaos-libs:/chaos/libs:ro
      - chaos-conf:/chaos
      - ./app.py:/app/app.py:ro
    working_dir: /app
    command: >
      sh -c "
        pip install redis --quiet &&
        python app.py
      "
    networks:
      - redis-chaos
    restart: "no"
