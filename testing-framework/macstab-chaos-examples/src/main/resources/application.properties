# ── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ── Redis ─────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=300ms

# ── Cache ─────────────────────────────────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ── Downstream service ────────────────────────────────────────────────────
downstream.base-url=${DOWNSTREAM_BASE_URL:http://localhost:9090}

# ── Resilience4j: circuit breaker ─────────────────────────────────────────
# Sliding-window of 10 calls; opens when 50%+ fail.
# Slow calls (> 1 s) count as failures.
# After 10 s the breaker moves to HALF_OPEN and allows 3 probe calls.
resilience4j.circuitbreaker.instances.user-service.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.user-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.slow-call-duration-threshold=1s
resilience4j.circuitbreaker.instances.user-service.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.user-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.user-service.automatic-transition-from-open-to-half-open-enabled=true

# ── Resilience4j: retry ───────────────────────────────────────────────────
resilience4j.retry.instances.user-service.max-attempts=3
resilience4j.retry.instances.user-service.wait-duration=100ms
resilience4j.retry.instances.user-service.retry-exceptions=java.io.IOException,java.net.ConnectException,redis.clients.jedis.exceptions.JedisConnectionException

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.macstab.chaos=DEBUG
logging.level.io.github.resilience4j=DEBUG
